<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Python</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #1e1e1e;
  --bg-term: #141414;
  --border:  #2d2d2d;
  --text:    #d4d4d4;
  --green:   #4ec9b0;
  --red:     #f44747;
  --blue:    #569cd6;
  --numcol:  #4a4a4a;
  --font:    'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
}

html, body {
  height: 100%; background: var(--bg);
  color: var(--text); font-family: var(--font);
  overflow: hidden;
}

#app { display: flex; flex-direction: column; height: 100vh; }

/* ── EDITOR ─────────────────────────────────────────────── */
#editor-area {
  flex: 1; display: flex; overflow: hidden; min-height: 0;
  position: relative;
}

#line-numbers {
  width: 52px; padding: 14px 0;
  background: var(--bg); color: var(--numcol);
  text-align: right; font-size: 14px; line-height: 21px;
  user-select: none; flex-shrink: 0; overflow: hidden;
  border-right: 1px solid var(--border);
}
#line-numbers div {
  padding-right: 12px; height: 21px;
  cursor: pointer; transition: color .1s, background .1s;
  border-radius: 2px 0 0 2px;
}
#line-numbers div:hover { color: #c5c5c5; background: rgba(255,255,255,0.04); }
#line-numbers div.cur { color: #bbb; font-weight: bold; }

/* The real textarea — invisible text, visible caret */
#editor {
  flex: 1; position: relative; z-index: 2;
  background: transparent; color: transparent;
  border: none; outline: none; resize: none;
  font-family: var(--font); font-size: 14px; line-height: 21px;
  padding: 14px 16px; tab-size: 4; -moz-tab-size: 4;
  caret-color: #aeafad; overflow: auto;
  white-space: pre; overflow-wrap: normal;
}
#editor::selection { background: rgba(38,79,120,0.6); }
#editor::-webkit-scrollbar { width: 8px; height: 8px; }
#editor::-webkit-scrollbar-thumb { background: #383838; border-radius: 4px; }
#editor::-webkit-scrollbar-thumb:hover { background: #555; }
#editor::-webkit-scrollbar-track { background: transparent; }

/* Highlight layer behind the textarea */
#highlight {
  position: absolute; top: 0; left: 52px; right: 0; bottom: 0;
  z-index: 1; pointer-events: none;
  font-family: var(--font); font-size: 14px; line-height: 21px;
  padding: 14px 16px;
  white-space: pre; overflow: hidden;
  color: var(--text);
}

/* ── AUTOCOMPLETE GHOST ──────────────────────────────────── */
/* Sits inside #highlight as a <span> with italic gray text */
.ghost {
  color: #555;
  font-style: italic;
}

/* ── AUTOCOMPLETE DROPDOWN ───────────────────────────────── */
#ac-box {
  position: fixed; z-index: 999;
  background: #252526; border: 1px solid #3c3c3c;
  border-radius: 4px; overflow: hidden;
  box-shadow: 0 6px 24px rgba(0,0,0,.6);
  min-width: 180px; max-width: 320px;
  display: none;
}
#ac-box.show { display: block; }
.ac-item {
  padding: 4px 12px; font-size: 13px; cursor: pointer;
  display: flex; align-items: center; gap: 8px;
  transition: background .08s;
}
.ac-item:hover, .ac-item.sel { background: #094771; }
.ac-kind {
  font-size: 10px; color: #569cd6; width: 14px; text-align: center;
  flex-shrink: 0; font-style: normal;
}
.ac-label { color: #d4d4d4; flex: 1; }
.ac-detail { color: #555; font-size: 11px; white-space: nowrap; }

/* ── RESIZE HANDLE ───────────────────────────────────────── */
#handle {
  height: 4px; background: var(--border);
  cursor: ns-resize; flex-shrink: 0;
  display: none; transition: background .15s;
}
#handle.vis { display: block; }
#handle:hover, #handle.drag { background: #007acc; }

/* ── TERMINAL ────────────────────────────────────────────── */
#term-panel {
  height: 240px; min-height: 60px;
  display: none; flex-direction: column;
  background: var(--bg-term); flex-shrink: 0;
}
#term-panel.vis { display: flex; }

#term-header {
  height: 30px; flex-shrink: 0;
  background: #1a1a1a; border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 14px; gap: 10px;
  font-size: 11px; user-select: none;
}
#run-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #333; transition: background .2s;
}
#run-dot.on { background: var(--green); animation: pulse .9s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.2} }
.th-label { color: #777; text-transform: uppercase; letter-spacing: .07em; font-size: 11px; }
.th-hint  { margin-left: auto; color: #2d2d2d; font-size: 11px; }
#clear-btn {
  background: none; border: none; color: #3a3a3a; cursor: pointer;
  font-family: var(--font); font-size: 11px; padding: 2px 6px; border-radius: 3px;
  transition: color .1s, background .1s;
}
#clear-btn:hover { color: #aaa; background: rgba(255,255,255,.06); }

#term-out {
  flex: 1; overflow-y: auto; overflow-x: auto;
  padding: 10px 14px; font-size: 13px; line-height: 20px;
}
#term-out::-webkit-scrollbar { width: 5px; }
#term-out::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }
.tl { display: block; white-space: pre-wrap; word-break: break-all; }
.c-out  { color: var(--text); }
.c-err  { color: var(--red); }
.c-info { color: var(--blue); }
.c-ok   { color: var(--green); }
.c-run  { color: #4ec9b0; }
.c-time { color: #3a3a3a; font-size: 11px; }

#stdin-bar {
  display: flex; align-items: center;
  padding: 5px 14px; gap: 8px;
  border-top: 1px solid var(--border); flex-shrink: 0;
}
#stdin-lbl { font-size: 11px; color: #353535; white-space: nowrap; }
#stdin {
  flex: 1; background: transparent; border: none; outline: none;
  color: #666; font-family: var(--font); font-size: 13px; caret-color: #666;
}
#stdin::placeholder { color: #2a2a2a; }

/* ── STATUS BAR ──────────────────────────────────────────── */
#status {
  height: 28px; flex-shrink: 0;
  background: #007acc;
  display: flex; align-items: center;
  padding: 0 10px; gap: 8px;
  font-size: 11px; color: rgba(255,255,255,.75);
  user-select: none; overflow: hidden;
}
#sb-msg { color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
.sr { margin-left: auto; display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.sr span { opacity: .6; white-space: nowrap; }
.sb-btn {
  background: rgba(255,255,255,0.15); border: none; border-radius: 3px;
  color: #fff; font-family: var(--font); font-size: 11px;
  padding: 2px 9px; cursor: pointer; white-space: nowrap;
  transition: background .12s;
  display: flex; align-items: center; gap: 5px;
}
.sb-btn:hover { background: rgba(255,255,255,0.28); }
.sb-btn:active { background: rgba(255,255,255,0.1); }
.sb-sep { color: rgba(255,255,255,.25); font-size: 14px; }

/* ── LOGO ────────────────────────────────────────────────── */
#brand-logo {
  position: fixed; top: 12px; right: 16px;
  height: 28px; width: auto;
  opacity: 0.5;
  pointer-events: none;
  z-index: 10;
  user-select: none;
}

/* ── SYNTAX COLORS ───────────────────────────────────────── */
.sk  { color: #569cd6; }   /* keyword */
.sb  { color: #4fc1ff; }   /* builtin */
.ss  { color: #ce9178; }   /* string */
.sc  { color: #6a9955; font-style: italic; } /* comment */
.sn  { color: #b5cea8; }   /* number */
.sd  { color: #c586c0; }   /* decorator */
.sf  { color: #dcdcaa; }   /* function name */
.so  { color: #d4d4d4; }   /* operator / default */

/* ── RESPONSIVE ──────────────────────────────────────────── */
#editor {
  font-size: clamp(12px, 2vw, 14px);
  line-height: clamp(18px, 2.5vw, 21px);
}
#highlight {
  font-size: clamp(12px, 2vw, 14px);
  line-height: clamp(18px, 2.5vw, 21px);
}
#line-numbers {
  font-size: clamp(12px, 2vw, 14px);
  line-height: clamp(18px, 2.5vw, 21px);
}
#term-out { font-size: clamp(11px, 1.8vw, 13px); }
#brand-logo { height: clamp(20px, 3vw, 28px); }

@media (max-width: 600px) {
  .hide-xs { display: none !important; }
  #line-numbers { width: 36px; }
  #highlight { left: 36px; }
  #editor { padding: 10px 10px; font-size: 12px; line-height: 18px; }
  #highlight { padding: 10px 10px; font-size: 12px; line-height: 18px; }
  #line-numbers { font-size: 12px; line-height: 18px; padding: 10px 0; }
  #term-panel { height: 180px; }
  #brand-logo { top: 8px; right: 8px; height: 20px; }
  #stdin-bar { padding: 4px 10px; }
  #term-out { padding: 8px 10px; }
}
@media (max-width: 480px) {
  .hide-sm { display: none !important; }
}
@media (min-width: 601px) and (max-width: 1024px) {
  #editor { font-size: 13px; line-height: 20px; }
  #highlight { font-size: 13px; line-height: 20px; }
  #line-numbers { font-size: 13px; line-height: 20px; width: 44px; }
  #highlight { left: 44px; }
}
</style>
</head>
<body>
<div id="app">

  <img id="brand-logo" src="logo.img" alt="CompiPlus">

  <div id="editor-area">
    <div id="line-numbers"><div class="cur">1</div></div>
    <div id="highlight"></div>
    <textarea id="editor" spellcheck="false" autocorrect="off" autocapitalize="off"
      placeholder="# Write Python here — Ctrl+Enter to run"></textarea>
  </div>

  <div id="handle"></div>

  <div id="term-panel">
    <div id="term-header">
      <div id="run-dot"></div>
      <span class="th-label">Terminal</span>
      <button id="clear-btn" onclick="clearTerm()">clear</button>
      <span class="th-hint">Esc to close</span>
    </div>
    <div id="term-out"></div>
    <div id="stdin-bar">
      <span id="stdin-lbl">stdin:</span>
      <input id="stdin" type="text" placeholder="input() values — separate with \n" spellcheck="false">
    </div>
  </div>

  <div id="status">
    <span id="sb-msg">Ready</span>
    <div class="sr">
      <span id="sb-cur" class="hide-xs">Ln 1, Col 1</span>
      <span class="hide-sm">Python 3</span>
      <span class="sb-sep hide-sm">|</span>
      <button class="sb-btn" onclick="runCode()">&#9654; Run</button>
      <button class="sb-btn" onclick="downloadCode()">&#8595; Download</button>
    </div>
  </div>

</div>

<!-- Autocomplete dropdown -->
<div id="ac-box"></div>

<script>
// ═══════════════════════════════════════════════════════════
//  ELEMENTS
// ═══════════════════════════════════════════════════════════
const editor   = document.getElementById('editor');
const hl       = document.getElementById('highlight');
const lineNums = document.getElementById('line-numbers');
const termOut  = document.getElementById('term-out');
const stdinEl  = document.getElementById('stdin');
const sbMsg    = document.getElementById('sb-msg');
const sbCur    = document.getElementById('sb-cur');
const runDot   = document.getElementById('run-dot');
const termPanel= document.getElementById('term-panel');
const handle   = document.getElementById('handle');
const acBox    = document.getElementById('ac-box');

// ═══════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════
let isRunning   = false;
let pyodide     = null;
let pyReady     = false;
let pyLoading   = false;
let termVisible = false;

// Autocomplete state
let acItems   = [];   // current suggestion list
let acSel     = 0;   // selected index
let ghostText = '';  // inline ghost text (top suggestion suffix)

// ═══════════════════════════════════════════════════════════
//  SYNTAX HIGHLIGHTING
// ═══════════════════════════════════════════════════════════
const KW = new Set([
  'False','None','True','and','as','assert','async','await',
  'break','class','continue','def','del','elif','else',
  'except','finally','for','from','global','if','import',
  'in','is','lambda','nonlocal','not','or','pass','raise',
  'return','try','while','with','yield',
]);
const BT = new Set([
  'abs','all','any','ascii','bin','bool','breakpoint','bytearray',
  'bytes','callable','chr','classmethod','compile','complex',
  'delattr','dict','dir','divmod','enumerate','eval','exec',
  'filter','float','format','frozenset','getattr','globals',
  'hasattr','hash','help','hex','id','input','int','isinstance',
  'issubclass','iter','len','list','locals','map','max','memoryview',
  'min','next','object','oct','open','ord','pow','print','property',
  'range','repr','reversed','round','set','setattr','slice','sorted',
  'staticmethod','str','sum','super','tuple','type','vars','zip',
  'Exception','ValueError','TypeError','KeyError','IndexError',
  'AttributeError','ImportError','OSError','RuntimeError',
  'StopIteration','NotImplementedError','NameError','ZeroDivisionError',
]);

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function syntaxHL(code) {
  // Process line by line to handle comments cleanly
  return code.split('\n').map(line => {
    // Full-line / end-of-line comment
    const commentIdx = findCommentStart(line);
    let codePart = commentIdx === -1 ? line : line.slice(0, commentIdx);
    let commentPart = commentIdx === -1 ? '' : line.slice(commentIdx);

    codePart = hlCode(codePart);
    if (commentPart) commentPart = `<span class="sc">${escHtml(commentPart)}</span>`;
    return codePart + commentPart;
  }).join('\n');
}

function findCommentStart(line) {
  let inStr = null, i = 0;
  while (i < line.length) {
    const c = line[i];
    if (!inStr && (c === '"' || c === "'")) {
      // check for triple
      if (line.slice(i, i+3) === c+c+c) { inStr = c+c+c; i += 3; continue; }
      inStr = c; i++; continue;
    }
    if (inStr) {
      if (inStr.length === 3 && line.slice(i, i+3) === inStr) { inStr = null; i += 3; continue; }
      if (inStr.length === 1 && c === inStr && line[i-1] !== '\\') { inStr = null; }
      i++; continue;
    }
    if (c === '#') return i;
    i++;
  }
  return -1;
}

function hlCode(s) {
  // Tokenise: strings first, then words, numbers, rest
  let out = '';
  let i = 0;
  while (i < s.length) {
    // Triple-quoted string
    if ((s[i] === '"' || s[i] === "'") && s.slice(i,i+3) === s[i]+s[i]+s[i]) {
      const q = s[i]+s[i]+s[i];
      let j = i + 3;
      while (j < s.length && s.slice(j,j+3) !== q) j++;
      j = Math.min(j+3, s.length);
      out += `<span class="ss">${escHtml(s.slice(i,j))}</span>`;
      i = j; continue;
    }
    // Single-quoted string
    if (s[i] === '"' || s[i] === "'") {
      const q = s[i]; let j = i+1;
      while (j < s.length && s[j] !== q) { if (s[j]==='\\') j++; j++; }
      j = Math.min(j+1, s.length);
      out += `<span class="ss">${escHtml(s.slice(i,j))}</span>`;
      i = j; continue;
    }
    // Decorator
    if (s[i] === '@') {
      let j = i+1; while (j < s.length && /\w/.test(s[j])) j++;
      out += `<span class="sd">${escHtml(s.slice(i,j))}</span>`;
      i = j; continue;
    }
    // Word
    if (/[a-zA-Z_]/.test(s[i])) {
      let j = i; while (j < s.length && /\w/.test(s[j])) j++;
      const word = s.slice(i,j);
      // Is next non-space char a '('? → function call
      let k = j; while (k < s.length && s[k] === ' ') k++;
      const isFnCall = s[k] === '(';
      let cls = 'so';
      if (KW.has(word))  cls = 'sk';
      else if (BT.has(word)) cls = 'sb';
      else if (isFnCall) cls = 'sf';
      out += `<span class="${cls}">${escHtml(word)}</span>`;
      i = j; continue;
    }
    // Number
    if (/[0-9]/.test(s[i]) || (s[i]==='.' && /[0-9]/.test(s[i+1]||''))) {
      let j = i; while (j < s.length && /[0-9._xXoObBa-fA-Fj]/.test(s[j])) j++;
      out += `<span class="sn">${escHtml(s.slice(i,j))}</span>`;
      i = j; continue;
    }
    out += escHtml(s[i]); i++;
  }
  return out;
}

function updateHighlight() {
  const code = editor.value;
  let highlighted = syntaxHL(code);

  // Append ghost text if any
  if (ghostText) {
    highlighted += `<span class="ghost">${escHtml(ghostText)}</span>`;
  }

  hl.innerHTML = highlighted;
  // Sync scroll
  hl.scrollTop  = editor.scrollTop;
  hl.scrollLeft = editor.scrollLeft;
}

editor.addEventListener('scroll', () => {
  hl.scrollTop  = editor.scrollTop;
  hl.scrollLeft = editor.scrollLeft;
  lineNums.scrollTop = editor.scrollTop;
});

// ═══════════════════════════════════════════════════════════
//  LINE NUMBERS
// ═══════════════════════════════════════════════════════════
function updateLines() {
  const lines   = editor.value.split('\n');
  const curLine = editor.value.slice(0, editor.selectionStart).split('\n').length;
  lineNums.innerHTML = lines.map((_,i) =>
    `<div class="${i+1===curLine?'cur':''}" data-line="${i+1}" title="Run line ${i+1}">${i+1}</div>`
  ).join('');
  lineNums.querySelectorAll('div').forEach(div => {
    div.addEventListener('click', () => runLine(+div.dataset.line));
  });
  lineNums.scrollTop = editor.scrollTop;
}

function runLine(lineNum) {
  const lines = editor.value.split('\n');
  const code  = lines[lineNum - 1];
  if (!code || !code.trim()) return;
  // Highlight the clicked line in the editor
  let pos = 0;
  for (let i = 0; i < lineNum - 1; i++) pos += lines[i].length + 1;
  editor.selectionStart = pos;
  editor.selectionEnd   = pos + lines[lineNum - 1].length;
  editor.focus();
  updateLines();
  // Run just that line
  runSingleLine(code.trim(), lineNum);
}

async function runSingleLine(code, lineNum) {
  // Run all code, just scroll to the clicked line first
  runCode();
}

function updateCursor() {
  const before = editor.value.slice(0, editor.selectionStart).split('\n');
  sbCur.textContent = `Ln ${before.length}, Col ${before[before.length-1].length+1}`;
}

// ═══════════════════════════════════════════════════════════
//  AUTOCOMPLETE DATA
// ═══════════════════════════════════════════════════════════
// kind: k=keyword, b=builtin, s=snippet, m=method
const AC_DB = [
  // Keywords
  ...['False','None','True','and','as','assert','async','await',
      'break','class','continue','def','del','elif','else',
      'except','finally','for','from','global','if','import',
      'in','is','lambda','nonlocal','not','or','pass','raise',
      'return','try','while','with','yield'].map(w=>({label:w,kind:'k',insert:w})),

  // Builtins with parens
  ...['abs','all','any','bin','bool','breakpoint','bytearray','bytes',
      'callable','chr','classmethod','compile','complex','delattr','dict',
      'dir','divmod','enumerate','eval','exec','filter','float','format',
      'frozenset','getattr','globals','hasattr','hash','help','hex','id',
      'input','int','isinstance','issubclass','iter','len','list','locals',
      'map','max','min','next','object','oct','open','ord','pow','print',
      'property','range','repr','reversed','round','set','setattr','slice',
      'sorted','staticmethod','str','sum','super','tuple','type','vars','zip',
  ].map(w=>({label:w,kind:'b',insert:w+'()',cursor:-1})),

  // Exceptions
  ...['Exception','ValueError','TypeError','KeyError','IndexError',
      'AttributeError','ImportError','OSError','RuntimeError',
      'StopIteration','NotImplementedError','NameError','ZeroDivisionError',
      'FileNotFoundError','PermissionError','TimeoutError',
  ].map(w=>({label:w,kind:'e',insert:w})),

  // Common snippets
  {label:'if __name__',kind:'s',insert:'if __name__ == "__main__":\n    ',detail:'main guard'},
  {label:'def ',kind:'s',insert:'def name():\n    ',detail:'function'},
  {label:'class ',kind:'s',insert:'class Name:\n    ',detail:'class'},
  {label:'for i in range',kind:'s',insert:'for i in range():\n    ',cursor:-8,detail:'for loop'},
  {label:'for item in',kind:'s',insert:'for item in :\n    ',detail:'for loop'},
  {label:'while True',kind:'s',insert:'while True:\n    ',detail:'infinite loop'},
  {label:'try:',kind:'s',insert:'try:\n    \nexcept Exception as e:\n    print(e)',detail:'try/except'},
  {label:'with open',kind:'s',insert:"with open('', 'r') as f:\n    ",cursor:-8,detail:'file open'},
  {label:'lambda',kind:'s',insert:'lambda x: ',detail:'lambda'},
  {label:'list comprehension',kind:'s',insert:'[x for x in ]',cursor:-1,detail:'list comp'},
  {label:'dict comprehension',kind:'s',insert:'{k: v for k, v in .items()}',detail:'dict comp'},
  {label:'import',kind:'k',insert:'import ',detail:''},
  {label:'from',kind:'k',insert:'from  import ',cursor:-8,detail:''},
  {label:'print(f"',kind:'s',insert:'print(f"")',cursor:-2,detail:'f-string print'},

  // Common stdlib
  ...['os','sys','re','math','json','time','datetime','random',
      'collections','itertools','functools','pathlib','typing',
      'copy','enum','dataclasses','threading','subprocess','logging',
      'argparse','unittest','abc',
  ].map(w=>({label:'import '+w,kind:'m',insert:'import '+w,detail:'stdlib'})),

  // numpy / pandas shortcuts
  {label:'import numpy',kind:'m',insert:'import numpy as np',detail:'alias'},
  {label:'import pandas',kind:'m',insert:'import pandas as pd',detail:'alias'},
  {label:'import matplotlib',kind:'m',insert:'import matplotlib.pyplot as plt',detail:'alias'},

  // String methods
  ...['strip','split','join','replace','find','startswith','endswith',
      'upper','lower','title','format','encode','decode','count','index',
  ].map(w=>({label:'.'+w,kind:'m',insert:'.'+w+'()',cursor:-1,detail:'str'})),

  // List methods
  ...['append','extend','insert','remove','pop','sort','reverse',
      'index','count','clear','copy',
  ].map(w=>({label:'.'+w,kind:'m',insert:'.'+w+'()',cursor:-1,detail:'list'})),

  // Dict methods
  ...['keys','values','items','get','update','pop','setdefault','copy',
  ].map(w=>({label:'.'+w,kind:'m',insert:'.'+w+'()',cursor:-1,detail:'dict'})),
];

// ═══════════════════════════════════════════════════════════
//  AUTOCOMPLETE LOGIC
// ═══════════════════════════════════════════════════════════
function getWordBefore() {
  const pos    = editor.selectionStart;
  const before = editor.value.slice(0, pos);
  // Include dot for method completions
  const match  = before.match(/([.a-zA-Z_][a-zA-Z0-9_]*)$/);
  return match ? match[1] : '';
}

function getSuggestions(word) {
  if (!word || word.length < 1) return [];
  const lw = word.toLowerCase();
  return AC_DB
    .filter(item => item.label.toLowerCase().startsWith(lw) && item.label !== word)
    .slice(0, 8);
}

function showAC(items) {
  acItems = items;
  acSel   = 0;
  if (!items.length) { hideAC(); return; }

  // Position dropdown near cursor
  const pos    = editor.selectionStart;
  const before = editor.value.slice(0, pos);
  const lines  = before.split('\n');
  const lineNo = lines.length - 1;
  const colNo  = lines[lineNo].length;

  const editorRect = editor.getBoundingClientRect();
  const lineH = 21;
  const charW = 8.4; // approx for 14px mono

  let top  = editorRect.top + 14 + (lineNo + 1) * lineH - editor.scrollTop + 4;
  let left = editorRect.left + 52 + 16 + colNo * charW - editor.scrollLeft;

  // Flip up if near bottom
  if (top + items.length * 26 > window.innerHeight - 30) {
    top = editorRect.top + 14 + lineNo * lineH - editor.scrollTop - items.length * 26 - 4;
  }
  left = Math.min(left, window.innerWidth - 330);

  acBox.style.top  = top + 'px';
  acBox.style.left = left + 'px';

  renderAC();
  acBox.classList.add('show');

  // Ghost text = suffix of top item
  updateGhost();
}

function renderAC() {
  const kindIcon = { k:'K', b:'ƒ', s:'✦', m:'·', e:'!' };
  acBox.innerHTML = acItems.map((item,i) => `
    <div class="ac-item${i===acSel?' sel':''}" data-i="${i}">
      <span class="ac-kind">${kindIcon[item.kind]||'·'}</span>
      <span class="ac-label">${escHtml(item.label)}</span>
      ${item.detail?`<span class="ac-detail">${escHtml(item.detail)}</span>`:''}
    </div>
  `).join('');
  acBox.querySelectorAll('.ac-item').forEach(el => {
    el.addEventListener('mousedown', e => { e.preventDefault(); applyAC(+el.dataset.i); });
  });
}

function updateGhost() {
  if (!acItems.length) { ghostText = ''; updateHighlight(); return; }
  const word = getWordBefore();
  const top  = acItems[acSel];
  // Ghost = the part of the label after what's already typed
  // Use insert text suffix after the typed prefix
  const suffix = top.insert.startsWith(word)
    ? top.insert.slice(word.length)
    : top.label.startsWith(word) ? top.label.slice(word.length) : '';
  // Strip trailing () from ghost (keep it clean)
  ghostText = suffix.replace(/\(\)$/, '');
  updateHighlight();
}

function hideAC() {
  acItems   = [];
  acSel     = 0;
  ghostText = '';
  acBox.classList.remove('show');
  updateHighlight();
}

function applyAC(idx) {
  const item   = acItems[idx !== undefined ? idx : acSel];
  if (!item) return;
  const word   = getWordBefore();
  const pos    = editor.selectionStart;
  const before = editor.value.slice(0, pos - word.length);
  const after  = editor.value.slice(pos);
  let insert   = item.insert;

  editor.value = before + insert + after;

  // Place cursor: if cursor:-1 means inside last parens
  let newPos = before.length + insert.length;
  if (item.cursor === -1 && insert.endsWith(')')) newPos -= 1;
  else if (item.cursor === -2 && insert.endsWith(')')) newPos -= 2;
  else if (typeof item.cursor === 'number' && item.cursor < -2) newPos += item.cursor;

  editor.selectionStart = editor.selectionEnd = newPos;
  hideAC();
  updateLines();
  updateHighlight();
  editor.focus();
}

// ═══════════════════════════════════════════════════════════
//  KEYBOARD HANDLER
// ═══════════════════════════════════════════════════════════
editor.addEventListener('keydown', e => {

  // ── AC navigation ──────────────────────────────────────
  if (acBox.classList.contains('show')) {
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      acSel = (acSel + 1) % acItems.length;
      renderAC(); updateGhost(); return;
    }
    if (e.key === 'ArrowUp') {
      e.preventDefault();
      acSel = (acSel - 1 + acItems.length) % acItems.length;
      renderAC(); updateGhost(); return;
    }
    if (e.key === 'Tab' || e.key === 'Enter' && acItems.length) {
      e.preventDefault();
      applyAC(); return;
    }
    if (e.key === 'Escape') {
      e.preventDefault(); hideAC(); return;
    }
  } else {
    // Tab with ghost → accept ghost
    if (e.key === 'Tab' && ghostText) {
      e.preventDefault();
      applyAC(0); return;
    }
  }

  // ── Ctrl+Enter → run ───────────────────────────────────
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    e.preventDefault(); runCode(); return;
  }

  // ── Escape → close terminal ────────────────────────────
  if (e.key === 'Escape') {
    e.preventDefault(); closeTerminal(); return;
  }

  // ── Tab → 4 spaces ─────────────────────────────────────
  if (e.key === 'Tab') {
    e.preventDefault();
    const s = editor.selectionStart, end = editor.selectionEnd;
    editor.value = editor.value.slice(0,s) + '    ' + editor.value.slice(end);
    editor.selectionStart = editor.selectionEnd = s + 4;
    updateLines(); updateHighlight(); return;
  }

  // ── Enter → smart indent ───────────────────────────────
  if (e.key === 'Enter') {
    e.preventDefault();
    const s      = editor.selectionStart;
    const before = editor.value.slice(0, s);
    const after  = editor.value.slice(editor.selectionEnd);
    const curLine= before.split('\n').pop();
    const indent = curLine.match(/^(\s*)/)[1];
    const extra  = /:\s*$/.test(curLine.trimEnd()) ? '    ' : '';
    const ins    = '\n' + indent + extra;
    editor.value = before + ins + after;
    editor.selectionStart = editor.selectionEnd = s + ins.length;
    hideAC();
    updateLines(); updateHighlight(); return;
  }
});

// Auto-() when user types ( after a known builtin
editor.addEventListener('input', e => {
  if (e.inputType !== 'insertText') { triggerAC(); return; }
  const ch = e.data;

  if (ch === '(') {
    // auto-close
    const pos   = editor.selectionStart;
    const after = editor.value.slice(pos);
    if (after[0] !== ')') {
      editor.value = editor.value.slice(0, pos) + ')' + after;
      editor.selectionStart = editor.selectionEnd = pos;
    }
    hideAC(); updateHighlight(); return;
  }

  if (ch === ')' || ch === '"' || ch === "'") {
    // auto-close quotes / parens
    const closeMap = { ')':null, '"':'"', "'":"'" };
    if (closeMap[ch]) {
      const pos   = editor.selectionStart;
      const after = editor.value.slice(pos);
      if (after[0] !== ch) {
        editor.value = editor.value.slice(0, pos) + closeMap[ch] + after;
        editor.selectionStart = editor.selectionEnd = pos;
      }
    }
  }

  triggerAC();
  updateLines();
  updateHighlight();
});

editor.addEventListener('click', () => { hideAC(); updateLines(); updateCursor(); });
editor.addEventListener('keyup', updateCursor);

function triggerAC() {
  const word  = getWordBefore();
  const items = getSuggestions(word);
  if (items.length) showAC(items);
  else hideAC();
}

// Dismiss AC when clicking outside
document.addEventListener('mousedown', e => {
  if (!acBox.contains(e.target) && e.target !== editor) hideAC();
});

// ═══════════════════════════════════════════════════════════
//  TERMINAL TOGGLE
// ═══════════════════════════════════════════════════════════
function openTerminal() {
  if (termVisible) return;
  termVisible = true;
  termPanel.classList.add('vis');
  handle.classList.add('vis');
}

function closeTerminal() {
  if (!termVisible) return;
  termVisible = false;
  termPanel.classList.remove('vis');
  handle.classList.remove('vis');
  editor.focus();
}

// Escape also works when focus is in terminal
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && termVisible && document.activeElement !== editor) {
    e.preventDefault(); closeTerminal();
  }
});

// ═══════════════════════════════════════════════════════════
//  TERMINAL HELPERS
// ═══════════════════════════════════════════════════════════
function appendTerm(html, cls = 'c-out') {
  const el = document.createElement('span');
  el.className = 'tl ' + cls;
  el.innerHTML = html;
  termOut.appendChild(el);
  termOut.scrollTop = termOut.scrollHeight;
}
function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function clearTerm() { termOut.innerHTML = ''; }

appendTerm('Python 3  ·  Ctrl+Enter to run  ·  Esc to close', 'c-info');

// ═══════════════════════════════════════════════════════════
//  PYODIDE + micropip
// ═══════════════════════════════════════════════════════════
const STDLIB = new Set([
  'sys','os','re','math','json','time','datetime','random','collections',
  'itertools','functools','pathlib','io','abc','copy','dataclasses','enum',
  'typing','types','string','textwrap','struct','base64','hashlib','hmac',
  'secrets','uuid','decimal','fractions','statistics','heapq','bisect',
  'array','queue','threading','multiprocessing','subprocess','socket','ssl',
  'http','urllib','email','html','xml','csv','sqlite3','pickle','shelve',
  'zipfile','tarfile','gzip','shutil','tempfile','glob','fnmatch',
  'linecache','traceback','warnings','logging','unittest','doctest',
  'pdb','timeit','ast','dis','inspect','gc','weakref','contextlib',
  'builtins','operator','keyword','token','tokenize','pprint','reprlib',
  'numbers','cmath','unicodedata','codecs','locale','gettext','argparse',
  'configparser','platform','signal','micropip','js','pyodide',
  'antigravity','this',
]);
const PKG_MAP = {
  cv2:'opencv-python', PIL:'Pillow', sklearn:'scikit-learn',
  bs4:'beautifulsoup4', yaml:'pyyaml', dotenv:'python-dotenv',
  dateutil:'python-dateutil', attr:'attrs', pkg_resources:'setuptools',
  nx:'networkx',
};

// JS-side cache — avoids a Python round-trip for already-installed packages
const installedPkgs = new Set();

// Preload Pyodide in the background as soon as the page is interactive.
// By the time the user hits Ctrl+Enter it will already be ready.
let pyLoadPromise = null;

function loadPy() {
  if (pyLoadPromise) return pyLoadPromise;
  pyLoadPromise = (async () => {
    if (pyReady) return;
    pyLoading = true;
    await new Promise((ok, fail) => {
      const s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js';
      s.onload = ok; s.onerror = fail;
      document.head.appendChild(s);
    });
    pyodide = await loadPyodide({ indexURL: 'https://cdn.jsdelivr.net/pyodide/v0.25.1/full/' });

    // Install the stdin override ONCE into the interpreter so it persists
    // across all subsequent runs without re-injection overhead.
    await pyodide.runPythonAsync(`
import builtins as _bi
_stdin_lines = []; _stdin_idx = [0]
def _input(prompt=''):
    if prompt: print(prompt, end='', flush=True)
    idx = _stdin_idx[0]
    if idx < len(_stdin_lines):
        val = _stdin_lines[idx]; _stdin_idx[0] += 1; print(val); return val
    return ''
_bi.input = _input
`);

    pyReady   = true;
    pyLoading = false;
  })();
  return pyLoadPromise;
}

// Start loading immediately — silent background boot.
loadPy();

async function autoInstall(code) {
  const re   = /^\s*(?:import|from)\s+([a-zA-Z0-9_]+)/gm;
  const needed = new Set();
  let m;
  while ((m = re.exec(code)) !== null) {
    const mod = m[1];
    if (!STDLIB.has(mod) && !installedPkgs.has(mod)) needed.add(mod);
  }
  if (!needed.size) return;

  // Load micropip lazily — only when a third-party package is actually needed.
  if (!installedPkgs.has('__micropip__')) {
    await pyodide.loadPackage('micropip');
    await pyodide.runPythonAsync('import micropip');
    installedPkgs.add('__micropip__');
  }

  // Install all missing packages in parallel.
  await Promise.all([...needed].map(async pkg => {
    const name = PKG_MAP[pkg] || pkg;
    try {
      await pyodide.runPythonAsync(`await micropip.install('${name}')`);
      installedPkgs.add(pkg);
      appendTerm(`  ✓ ${name}`, 'c-ok');
    } catch(err) {
      appendTerm(`  ✗ ${name}: ${esc((err.message||'').split('\n')[0])}`, 'c-err');
    }
  }));
}

// ═══════════════════════════════════════════════════════════
//  RUN
// ═══════════════════════════════════════════════════════════
async function runCode() {
  if (isRunning) return;
  const code = editor.value.trim();
  if (!code) return;

  isRunning = true;
  openTerminal();
  runDot.classList.add('on');
  sbMsg.textContent = 'Running…';

  const t0 = Date.now();
  appendTerm('', 'c-out');
  appendTerm('▶  python', 'c-run');

  try {
    // If Pyodide isn't ready yet, wait and inform the user.
    if (!pyReady) {
      appendTerm('Loading Python runtime…', 'c-info');
      await loadPy();
      appendTerm('Python ready ✓', 'c-ok');
    }

    await autoInstall(code);

    // Push stdin lines into the persistent Python-side list.
    const rawStdin   = stdinEl.value.replace(/\\n/g, '\n');
    const stdinLines = rawStdin ? rawStdin.split('\n') : [];
    pyodide.globals.set('_stdin_lines', pyodide.toPy(stdinLines));
    pyodide.globals.set('_stdin_idx',   pyodide.toPy([0]));

    // Stream stdout/stderr line-by-line so output appears immediately.
    let hasErr = false;
    pyodide.setStdout({ batched: l => appendTerm(esc(l), 'c-out') });
    pyodide.setStderr({ batched: l => { appendTerm(esc(l), 'c-err'); hasErr = true; } });

    await pyodide.runPythonAsync(code);

    const elapsed = ((Date.now()-t0)/1000).toFixed(2);
    if (hasErr) {
      sbMsg.textContent = 'Error';
    } else {
      appendTerm(`Finished in ${elapsed}s`, 'c-time');
      sbMsg.textContent = `Done — ${elapsed}s`;
    }
  } catch(err) {
    (err.message||String(err)).trimEnd().split('\n').forEach(l=>appendTerm(esc(l),'c-err'));
    sbMsg.textContent = 'Error';
  }

  runDot.classList.remove('on');
  isRunning = false;
}

// ═══════════════════════════════════════════════════════════
//  DOWNLOAD
// ═══════════════════════════════════════════════════════════
function downloadCode() {
  const code = editor.value;
  if (!code.trim()) { sbMsg.textContent = 'Nothing to save'; return; }

  const raw = prompt('Save as:', 'main.py');
  if (raw === null) return; // user cancelled

  // Ensure the filename ends with .py
  const filename = raw.trim().endsWith('.py') ? raw.trim() : raw.trim() + '.py';
  if (!filename || filename === '.py') return;

  const blob = new Blob([code + '\n\n# Coded with CompiPlus at https://compiplus.online'], { type: 'text/x-python' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);

  sbMsg.textContent = `Saved ${filename}`;
  setTimeout(() => { sbMsg.textContent = 'Ready'; }, 2500);
}

// Ctrl+S / Cmd+S → download
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 's') {
    e.preventDefault();
    downloadCode();
  }
});

// ═══════════════════════════════════════════════════════════
//  RESIZE HANDLE
// ═══════════════════════════════════════════════════════════
{
  let drag=false, startY, startH;
  handle.addEventListener('mousedown', e => {
    drag=true; startY=e.clientY; startH=termPanel.offsetHeight;
    handle.classList.add('drag');
    document.body.style.cssText='cursor:ns-resize;user-select:none';
  });
  document.addEventListener('mousemove', e => {
    if (!drag) return;
    const h=Math.min(Math.max(startH+(startY-e.clientY),60),window.innerHeight*.8);
    termPanel.style.height=h+'px';
  });
  document.addEventListener('mouseup', () => {
    if (!drag) return; drag=false;
    handle.classList.remove('drag');
    document.body.style.cssText='';
  });
}

function sleep(ms) { return new Promise(r=>setTimeout(r,ms)); }

// Initial render
updateLines();
updateHighlight();
editor.focus();
</script>
