<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <title>ChargeLB</title>
  <link rel="preconnect" href="https://a.basemaps.cartocdn.com"/>
  <link rel="preconnect" href="https://b.basemaps.cartocdn.com"/>
  <link rel="preconnect" href="https://c.basemaps.cartocdn.com"/>
  <link rel="preconnect" href="https://d.basemaps.cartocdn.com"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>

  <style>
    /* ─── Reset ─── */
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}
    html,body{width:100%;height:100%;overflow:hidden;background:#000;
      font-family:-apple-system,'SF Pro Text','SF Pro Display','Helvetica Neue',sans-serif;
      -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
    #map{width:100%;height:100%;background:#080808}
    .leaflet-control-zoom,.leaflet-control-attribution,.leaflet-control-container{display:none!important}

    /* ─── Shared spring cubic ─── */
    :root{
      --spring: cubic-bezier(0.32,0.72,0,1);
      --bounce: cubic-bezier(0.34,1.56,0.64,1);
      --ease:   cubic-bezier(0.22,1,0.36,1);
    }

    /* ════════════════════════════════════════
       SEARCH BAR
    ════════════════════════════════════════ */
    .search-row{
      position:fixed;
      top:max(16px,env(safe-area-inset-top,16px));
      left:50%;transform:translateX(-50%);
      z-index:500;
      display:flex;align-items:center;gap:0;
      width:min(340px,calc(100vw - 32px));
      transition:width 0.4s var(--spring);
      animation:fadeDown 0.5s var(--ease) both;
    }
    .search-row.active{width:min(420px,calc(100vw - 28px))}
    @keyframes fadeDown{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

    .map-search{
      flex:1;min-width:0;height:46px;
      background:rgba(22,22,24,0.82);
      backdrop-filter:saturate(180%) blur(36px);
      -webkit-backdrop-filter:saturate(180%) blur(36px);
      border-radius:23px;
      border:0.5px solid rgba(255,255,255,0.1);
      box-shadow:inset 0 0.5px 0 rgba(255,255,255,0.07),0 4px 24px rgba(0,0,0,0.55);
      display:flex;align-items:center;padding:0 14px;gap:9px;cursor:text;
      transition:border-color 0.22s,box-shadow 0.22s;
    }
    .map-search.active{
      border-color:rgba(10,132,255,0.35);
      box-shadow:inset 0 0.5px 0 rgba(255,255,255,0.07),0 0 0 3.5px rgba(10,132,255,0.18),0 4px 24px rgba(0,0,0,0.55);
    }
    .map-search-icon{flex-shrink:0;opacity:0.28}
    .search-input{
      flex:1;min-width:0;background:none;border:none;outline:none;
      font-size:15px;color:#fff;letter-spacing:-0.2px;
      font-family:-apple-system,'SF Pro Text',sans-serif;
      -webkit-font-smoothing:antialiased;caret-color:#0a84ff;
    }
    .search-input::placeholder{color:rgba(255,255,255,0.3)}
    .search-input::-webkit-search-cancel-button{display:none}

    .search-clear{
      display:none;background:none;border:none;cursor:pointer;
      padding:2px;flex-shrink:0;opacity:0.6;
      transition:opacity 0.15s,transform 0.15s var(--bounce);
    }
    .search-clear:hover{opacity:1}
    .search-clear:active{transform:scale(0.82)}
    .search-clear.visible{display:flex}

    .map-search-mic{
      flex-shrink:0;opacity:0.62;cursor:pointer;
      background:none;border:none;padding:3px;
      display:flex;align-items:center;
      transition:opacity 0.18s,transform 0.16s var(--bounce);
    }
    .map-search-mic:hover{opacity:1}
    .map-search-mic:active{transform:scale(0.84)}

    .search-cancel{
      flex-shrink:0;background:none;border:none;cursor:pointer;
      font-size:15px;font-weight:400;color:#0a84ff;
      font-family:-apple-system,'SF Pro Text',sans-serif;
      letter-spacing:-0.1px;white-space:nowrap;
      max-width:0;overflow:hidden;opacity:0;padding:0;
      transition:max-width 0.4s var(--spring),opacity 0.28s ease,padding 0.4s;
    }
    .search-row.active .search-cancel{max-width:72px;opacity:1;padding:0 0 0 10px}

    /* ════════════════════════════════════════
       LPM ALERT (Low Power Mode / Feature Unavailable)
    ════════════════════════════════════════ */
    .lpm-scrim{
      position:fixed;inset:0;z-index:2000;
      background:rgba(0,0,0,0);
      display:flex;align-items:center;justify-content:center;
      pointer-events:none;
      transition:background 0.3s ease;
    }
    .lpm-scrim.active{background:rgba(0,0,0,0.5);pointer-events:all}
    .lpm-alert{
      width:270px;
      background:rgba(28,28,30,0.98);
      backdrop-filter:saturate(200%) blur(52px);
      -webkit-backdrop-filter:saturate(200%) blur(52px);
      border-radius:14px;
      border:0.5px solid rgba(255,255,255,0.13);
      box-shadow:0 32px 72px rgba(0,0,0,0.8),inset 0 0.5px 0 rgba(255,255,255,0.08);
      overflow:hidden;
      opacity:0;transform:scale(0.86);
      transition:opacity 0.28s var(--ease),transform 0.36s cubic-bezier(0.34,1.28,0.64,1);
    }
    .lpm-scrim.active .lpm-alert{opacity:1;transform:scale(1)}
    .lpm-body{padding:22px 18px 16px;display:flex;flex-direction:column;align-items:center;gap:10px}
    .lpm-battery{width:44px;height:44px;display:flex;align-items:center;justify-content:center}
    .lpm-x-circle{
      width:44px;height:44px;border-radius:50%;
      background:rgba(255,59,48,0.14);border:0.5px solid rgba(255,59,48,0.26);
      display:flex;align-items:center;justify-content:center;
    }
    .lpm-title{font-size:17px;font-weight:700;color:#fff;letter-spacing:-0.4px;text-align:center;line-height:1.3}
    .lpm-message{font-size:13px;color:rgba(255,255,255,0.65);text-align:center;line-height:1.55;letter-spacing:-0.1px}
    .lpm-divider{height:0.5px;background:rgba(255,255,255,0.1);width:100%}
    .lpm-btn{
      display:block;width:100%;padding:13px 0;
      background:none;border:none;
      font-size:17px;font-weight:600;color:#0a84ff;
      font-family:inherit;letter-spacing:-0.3px;text-align:center;cursor:pointer;
      transition:background 0.12s;
    }
    .lpm-btn:hover{background:rgba(255,255,255,0.04)}
    .lpm-btn:active{background:rgba(255,255,255,0.09)}

    /* ════════════════════════════════════════
       MAP BUTTONS — recenter + GPS
       Glassy pill stack, bottom-right
    ════════════════════════════════════════ */
    .map-btns{
      position:fixed;bottom:max(env(safe-area-inset-bottom,24px),24px);right:16px;
      z-index:600;
      display:flex;flex-direction:column;gap:8px;
      animation:fadeUp 0.5s 0.1s var(--ease) both;
    }
    @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

    .map-btn{
      width:44px;height:44px;border-radius:50%;border:none;
      background:rgba(22,22,24,0.82);
      backdrop-filter:saturate(180%) blur(36px);
      -webkit-backdrop-filter:saturate(180%) blur(36px);
      border:0.5px solid rgba(255,255,255,0.1);
      box-shadow:inset 0 0.5px 0 rgba(255,255,255,0.07),0 4px 20px rgba(0,0,0,0.5);
      cursor:pointer;display:flex;align-items:center;justify-content:center;
      transition:transform 0.2s var(--bounce),opacity 0.15s,background 0.2s,box-shadow 0.2s;
    }
    .map-btn:hover{box-shadow:inset 0 0.5px 0 rgba(255,255,255,0.07),0 6px 28px rgba(0,0,0,0.65)}
    .map-btn:active{transform:scale(0.87);opacity:0.72}

    /* GPS active state */
    .map-btn.gps-active{
      background:rgba(10,132,255,0.16);
      border-color:rgba(10,132,255,0.32);
      box-shadow:inset 0 0.5px 0 rgba(255,255,255,0.07),0 4px 20px rgba(10,132,255,0.25);
    }
    .map-btn.gps-active .gps-btn-arrow path{fill:#0a84ff;stroke:none}
    .map-btn.gps-locating .gps-btn-arrow{opacity:0}
    .map-btn.gps-locating .gps-btn-spinner{display:block}
    .map-btn.spinning svg{animation:spin-once 0.6s var(--ease) forwards}
    @keyframes spin-once{to{transform:rotate(360deg)}}

    /* ════════════════════════════════════════
       MAP PIN — EV charging teardrop
    ════════════════════════════════════════ */
    .dest-pin{
      position:relative;width:22px;height:31px;cursor:pointer;
      filter:drop-shadow(0 2px 6px rgba(10,132,255,0.5));
      transition:transform 0.22s var(--bounce),filter 0.2s;
    }
    .dest-pin:hover{transform:translateY(-2px);filter:drop-shadow(0 4px 10px rgba(10,132,255,0.7))}
    .dest-pin-body{
      position:absolute;top:0;left:50%;width:20px;height:20px;
      background:linear-gradient(145deg,#1e96ff 0%,#0a84ff 60%,#0070e0 100%);
      border-radius:50% 50% 50% 0;transform:translateX(-50%) rotate(-45deg);
      transition:transform 0.22s var(--bounce);
      box-shadow:inset 0 1.5px 0 rgba(255,255,255,0.3),inset 0 -1px 0 rgba(0,0,0,0.1);
    }
    .dest-pin-ring{
      position:absolute;top:0;left:50%;width:20px;height:20px;
      border-radius:50% 50% 50% 0;border:0.5px solid rgba(255,255,255,0.22);
      transform:translateX(-50%) rotate(-45deg);pointer-events:none;
    }
    .dest-pin-inner{
      position:absolute;top:5px;left:50%;transform:translateX(-50%);
      width:10px;height:10px;background:#fff;border-radius:50%;z-index:1;
      box-shadow:0 1px 3px rgba(0,0,60,0.2);
    }
    .dest-pin-bolt{
      position:absolute;top:6.5px;left:50%;transform:translateX(-50%);
      z-index:2;width:6px;height:7px;
    }
    .dest-pin-tip{
      position:absolute;bottom:3px;left:50%;transform:translateX(-50%);
      width:0;height:0;
      border-left:3px solid transparent;border-right:3px solid transparent;
      border-top:6px solid #0a84ff;
    }
    .dest-pin-shadow{
      position:absolute;bottom:0;left:50%;transform:translateX(-50%);
      width:10px;height:3px;background:rgba(0,0,0,0.18);border-radius:50%;filter:blur(2.5px);
    }
    .dest-pin.tapped .dest-pin-body{transform:translateX(-50%) rotate(-45deg) scale(0.78)}
    .dest-pin-ping{display:none}

    /* ════════════════════════════════════════
       GPS USER DOT
    ════════════════════════════════════════ */
    .gps-wrap{position:relative;width:22px;height:22px}
    .gps-heading{
      position:absolute;left:50%;top:50%;
      width:0;height:0;
      border-left:8px solid transparent;border-right:8px solid transparent;
      border-bottom:24px solid rgba(10,132,255,0.28);
      margin-left:-8px;margin-top:-24px;
      transform-origin:8px 24px;filter:blur(1.5px);pointer-events:none;
    }
    .gps-ring{
      position:absolute;inset:-2px;border-radius:50%;
      background:#fff;
      box-shadow:0 1px 6px rgba(0,0,0,0.4),0 0 0 0.5px rgba(0,0,0,0.06);
    }
    .gps-dot{
      position:absolute;inset:2px;border-radius:50%;
      background:#0a84ff;
    }
    .gps-pulse{
      position:absolute;top:50%;left:50%;
      width:22px;height:22px;margin:-11px 0 0 -11px;
      border-radius:50%;background:rgba(10,132,255,0.38);
      animation:gps-halo 2.2s ease-out infinite;pointer-events:none;
    }
    .gps-pulse.done{animation:none;opacity:0}
    @keyframes gps-halo{0%{transform:scale(1);opacity:0.65}100%{transform:scale(3.8);opacity:0}}

    /* ════════════════════════════════════════
       BOTTOM SHEET — shared chrome
    ════════════════════════════════════════ */
    .sheet, .loc-sheet{
      position:fixed;
      bottom:max(env(safe-area-inset-bottom,18px),18px);
      left:50%;
      transform:translateX(-50%) translateY(calc(100% + 72px));
      width:min(370px,calc(100vw - 20px));
      z-index:900;
      transition:transform 0.54s var(--spring);
      will-change:transform;
      pointer-events:none;
    }
    .sheet.open,.loc-sheet.open{transform:translateX(-50%) translateY(0);pointer-events:all}
    .sheet.dragging,.loc-sheet.dragging{transition:none}
    .loc-sheet{z-index:850}

    /* Glass card surface */
    .card,.loc-card{
      background:rgba(12,12,14,0.97);
      backdrop-filter:saturate(220%) blur(60px);
      -webkit-backdrop-filter:saturate(220%) blur(60px);
      border-radius:26px;
      border:0.5px solid rgba(255,255,255,0.1);
      box-shadow:
        inset 0 0.5px 0 rgba(255,255,255,0.08),
        0 36px 88px rgba(0,0,0,0.92),
        0 8px 24px rgba(0,0,0,0.6);
      overflow:hidden;position:relative;
    }

    /* Drag handle */
    .card-handle,.loc-handle{
      display:flex;justify-content:center;
      padding:11px 0 5px;cursor:grab;position:relative;z-index:60;
    }
    .card-handle:active,.loc-handle:active{cursor:grabbing}
    .card-handle-bar,.loc-handle-bar{
      width:32px;height:4px;border-radius:2px;
      background:rgba(255,255,255,0.15);
      transition:width 0.22s var(--ease),background 0.2s;
    }
    .card-handle:hover .card-handle-bar,
    .loc-handle:hover .loc-handle-bar{width:44px;background:rgba(255,255,255,0.26)}

    /* Side vignettes */
    .card-vignette-l,.card-vignette-r{
      position:absolute;top:0;bottom:0;width:48px;z-index:50;pointer-events:none;
    }
    .card-vignette-l{left:0;background:linear-gradient(90deg,rgba(8,8,10,0.9) 0%,transparent 100%)}
    .card-vignette-r{right:0;background:linear-gradient(270deg,rgba(8,8,10,0.9) 0%,transparent 100%)}

    /* ════════════════════════════════════════
       iOS ACTIVITY INDICATOR — loader overlay
    ════════════════════════════════════════ */
    .faceid-wrap{
      position:absolute;inset:0;z-index:200;
      background:rgba(12,12,14,0.98);border-radius:26px;
      display:flex;align-items:center;justify-content:center;
      transition:opacity 0.38s var(--ease);
    }
    .faceid-wrap.done{opacity:0;pointer-events:none}
    .loader-wheel{position:relative;width:36px;height:36px}
    .loader-wheel .s{
      position:absolute;top:50%;left:50%;
      width:2.5px;height:8px;margin-top:-4px;margin-left:-1.25px;
      border-radius:1.5px;background:#fff;
      transform-origin:50% -10px;opacity:0.12;
      animation:ios-spoke 1.2s linear infinite;will-change:opacity;
    }
    .s:nth-child(1){transform:rotate(0deg);animation-delay:0s}
    .s:nth-child(2){transform:rotate(30deg);animation-delay:-1.1s}
    .s:nth-child(3){transform:rotate(60deg);animation-delay:-1.0s}
    .s:nth-child(4){transform:rotate(90deg);animation-delay:-0.9s}
    .s:nth-child(5){transform:rotate(120deg);animation-delay:-0.8s}
    .s:nth-child(6){transform:rotate(150deg);animation-delay:-0.7s}
    .s:nth-child(7){transform:rotate(180deg);animation-delay:-0.6s}
    .s:nth-child(8){transform:rotate(210deg);animation-delay:-0.5s}
    .s:nth-child(9){transform:rotate(240deg);animation-delay:-0.4s}
    .s:nth-child(10){transform:rotate(270deg);animation-delay:-0.3s}
    .s:nth-child(11){transform:rotate(300deg);animation-delay:-0.2s}
    .s:nth-child(12){transform:rotate(330deg);animation-delay:-0.1s}

    /* ════════════════════════════════════════
       CAR IMAGE STAGE
    ════════════════════════════════════════ */
    .car-stage{height:158px;width:100%;position:relative;overflow:hidden}
    .car-img{
      width:100%;height:100%;object-fit:contain;object-position:center;
      display:block;opacity:0;transform:scale(0.95) translateY(8px);
      transition:opacity 0.5s var(--ease),transform 0.6s var(--ease);
    }
    .car-img.visible{opacity:1;transform:scale(1) translateY(0)}
    .car-placeholder{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
    .car-fade{
      position:absolute;bottom:0;left:0;right:0;height:52px;
      background:linear-gradient(transparent,rgba(12,12,14,0.96));
      pointer-events:none;z-index:5;
    }

    /* ════════════════════════════════════════
       STATION CARD CONTENT
    ════════════════════════════════════════ */
    /* Reveal animation shared by all content rows */
    .card-identity,.card-line,.card-status,.card-rows,.card-cta{
      opacity:0;transform:translateY(8px);
      transition:opacity 0.3s ease,transform 0.4s var(--ease);
    }
    .card-identity.reveal,.card-line.reveal,.card-status.reveal,
    .card-rows.reveal,.card-cta.reveal{opacity:1;transform:translateY(0)}

    /* Identity */
    .card-identity{
      display:flex;align-items:flex-start;justify-content:space-between;
      padding:2px 18px 0;position:relative;z-index:60;
    }
    .card-name{
      font-size:17px;font-weight:700;color:#fff;
      letter-spacing:-0.5px;line-height:1.25;
    }
    .card-addr{
      font-size:12px;color:rgba(255,255,255,0.34);margin-top:3px;
      display:flex;align-items:center;gap:4px;letter-spacing:-0.1px;
    }
    .addr-dot{width:2.5px;height:2.5px;border-radius:50%;background:rgba(255,255,255,0.2)}

    /* Hairline */
    .card-line{
      height:0.5px;background:rgba(255,255,255,0.06);
      margin:12px 18px 0;position:relative;z-index:60;
    }

    /* Status row */
    .card-status{
      display:flex;align-items:center;justify-content:space-between;
      padding:11px 18px 0;position:relative;z-index:60;
    }
    .status-pill{
      display:flex;align-items:center;gap:5px;
      background:rgba(48,209,88,0.1);
      border:0.5px solid rgba(48,209,88,0.2);
      border-radius:20px;padding:4px 10px;
    }
    .status-dot{
      width:5px;height:5px;border-radius:50%;background:#30d158;
      box-shadow:0 0 5px rgba(48,209,88,0.9);
      animation:dot-breathe 2.8s ease-in-out infinite;
    }
    @keyframes dot-breathe{
      0%,100%{box-shadow:0 0 4px rgba(48,209,88,0.7)}
      50%{box-shadow:0 0 10px rgba(48,209,88,1),0 0 18px rgba(48,209,88,0.28)}
    }
    .status-txt{font-size:11px;font-weight:600;color:#30d158;letter-spacing:-0.1px}
    .status-ports{font-size:11px;color:rgba(255,255,255,0.28);letter-spacing:-0.2px}

    /* Info row (price only) */
    .card-rows{
      display:flex;flex-direction:column;padding:8px 18px 0;
      position:relative;z-index:60;
    }
    .card-row{
      display:flex;align-items:center;justify-content:space-between;
      padding:8px 0;border-bottom:0.5px solid rgba(255,255,255,0.05);
    }
    .card-row:last-child{border-bottom:none}
    .row-label{font-size:13px;color:rgba(255,255,255,0.34);font-weight:400;letter-spacing:-0.1px}
    .row-val{font-size:13px;font-weight:600;color:#fff;letter-spacing:-0.2px}
    .row-val.green{color:#30d158}
    .row-val.blue{color:#0a84ff}

    /* CTA — Apple Maps icon-button row */
    .card-cta{padding:4px 18px 18px;position:relative;z-index:60}
    .cta-line{height:0.5px;background:rgba(255,255,255,0.06);margin-bottom:2px}
    .cta-actions{display:flex;align-items:center;gap:0}
    .cta-action{
      flex:1;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:5px;padding:12px 8px;
      background:none;border:none;cursor:pointer;font-family:inherit;
      transition:opacity 0.14s;position:relative;
    }
    .cta-action:not(:last-child)::after{
      content:'';
      position:absolute;right:0;top:22%;bottom:22%;
      width:0.5px;background:rgba(255,255,255,0.06);
    }
    .cta-action:hover{opacity:0.7}
    .cta-action:active{opacity:0.45}
    .cta-action-icon{
      width:30px;height:30px;border-radius:50%;
      background:rgba(10,132,255,0.11);
      border:0.5px solid rgba(10,132,255,0.18);
      display:flex;align-items:center;justify-content:center;flex-shrink:0;
      transition:background 0.15s,transform 0.16s var(--bounce);
    }
    .cta-action:active .cta-action-icon{background:rgba(10,132,255,0.2);transform:scale(0.9)}
    .cta-action-label{font-size:11px;font-weight:500;color:#0a84ff;letter-spacing:-0.1px;white-space:nowrap}

    /* ════════════════════════════════════════
       MY-LOCATION WIDGET
    ════════════════════════════════════════ */
    .loc-body{
      display:flex;align-items:center;gap:14px;
      padding:10px 18px 18px;
      opacity:0;transform:translateY(6px);
      transition:opacity 0.28s ease 0.06s,transform 0.36s var(--ease) 0.06s;
    }
    .loc-sheet.open .loc-body{opacity:1;transform:translateY(0)}
    .loc-puck{
      width:38px;height:38px;border-radius:50%;flex-shrink:0;
      background:rgba(10,132,255,0.12);
      border:0.5px solid rgba(10,132,255,0.28);
      display:flex;align-items:center;justify-content:center;
    }
    .loc-text{flex:1;min-width:0}
    .loc-title{font-size:15px;font-weight:600;color:#fff;letter-spacing:-0.35px;line-height:1.25}
    .loc-subtitle{font-size:12px;color:rgba(255,255,255,0.36);margin-top:2px;letter-spacing:-0.1px}

    /* ════════════════════════════════════════
       NEAREST STATION BANNER — top of screen
       Slides down from search bar area
    ════════════════════════════════════════ */
    .nearest-banner{
      position:fixed;
      top:max(76px,calc(env(safe-area-inset-top,16px) + 60px));
      left:50%;
      transform:translateX(-50%) translateY(-16px);
      z-index:490;
      display:flex;align-items:center;gap:9px;
      padding:10px 16px;
      background:rgba(22,22,24,0.9);
      backdrop-filter:saturate(180%) blur(36px);
      -webkit-backdrop-filter:saturate(180%) blur(36px);
      border-radius:14px;
      border:0.5px solid rgba(255,255,255,0.1);
      box-shadow:inset 0 0.5px 0 rgba(255,255,255,0.07),0 6px 24px rgba(0,0,0,0.55);
      font-size:13px;font-weight:500;color:rgba(255,255,255,0.86);letter-spacing:-0.1px;
      white-space:nowrap;max-width:calc(100vw - 32px);
      opacity:0;pointer-events:none;
      transition:opacity 0.3s var(--ease),transform 0.38s var(--ease);
    }
    .nearest-banner.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:all}
    .nearest-banner-dot{width:7px;height:7px;border-radius:50%;background:#0a84ff;flex-shrink:0;box-shadow:0 0 5px rgba(10,132,255,0.7)}

    /* ════════════════════════════════════════
       GPS TOAST — error / status messages
    ════════════════════════════════════════ */
    .gps-toast{
      position:fixed;
      bottom:max(env(safe-area-inset-bottom,20px),20px);left:50%;
      z-index:1500;
      background:rgba(22,22,24,0.94);
      backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);
      border:0.5px solid rgba(255,255,255,0.1);border-radius:14px;
      padding:10px 18px;
      font-size:13px;font-weight:500;color:rgba(255,255,255,0.82);letter-spacing:-0.1px;white-space:nowrap;
      box-shadow:inset 0 0.5px 0 rgba(255,255,255,0.06),0 8px 24px rgba(0,0,0,0.5);
      opacity:0;pointer-events:none;
      transform:translateX(-50%) translateY(12px);
      transition:opacity 0.28s var(--ease),transform 0.32s var(--ease);
    }
    .gps-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  </style>
</head>
<body>

<div id="map"></div>

<!-- Screen edge vignette -->
<div aria-hidden="true" style="
  position:fixed;inset:0;z-index:400;pointer-events:none;
  background:
    linear-gradient(to bottom, rgba(0,0,0,0.16) 0%,transparent 8%),
    linear-gradient(to top,    rgba(0,0,0,0.16) 0%,transparent 8%),

    linear-gradient(to left,   rgba(0,0,0,0.12) 0%,transparent 6%);
"></div>

<!-- Search row -->
<div class="search-row" id="search-row">
  <div class="map-search" id="map-search" onclick="activateSearch()">
    <svg class="map-search-icon" width="15" height="15" viewBox="0 0 15 15" fill="none">
      <circle cx="6.5" cy="6.5" r="5" stroke="rgba(255,255,255,0.85)" stroke-width="1.5"/>

      autocomplete="off" autocorrect="off" spellcheck="false"

      <svg width="15" height="15" viewBox="0 0 15 15" fill="none">

</div>

<!-- LPM alert -->
<div class="lpm-scrim" id="lpm-scrim" onclick="closeLPM()">
  <div class="lpm-alert" onclick="event.stopPropagation()">
    <div class="lpm-body">

          </svg>

    </div>
    <div class="lpm-divider"></div>
    <button class="lpm-btn" onclick="closeLPM()">OK</button>
  </div>
</div>

<!-- GPS toast -->
<div class="gps-toast" id="gps-toast"></div>

<!-- Nearest station banner -->
<div class="nearest-banner" id="nearest-banner">
  <div class="nearest-banner-dot"></div>
  <span id="nearest-text"></span>
</div>

<!-- Map buttons — GPS + recenter stacked -->
<div class="map-btns">
  <button class="map-btn" id="btn-gps" aria-label="My location">
    <svg class="gps-btn-arrow" width="20" height="20" viewBox="0 0 20 20" fill="none">
      <path d="M10 2L17.5 10L10 13.5L2.5 10L10 2Z" stroke="rgba(255,255,255,0.72)" stroke-width="1.5" stroke-linejoin="round" fill="none"/>
      <path d="M10 13.5V18" stroke="rgba(255,255,255,0.72)" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
  </button>
  <button class="map-btn" id="btn-recenter" aria-label="View Lebanon">
    <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
      <path d="M10 1.5C6.41 1.5 3.5 4.41 3.5 8C3.5 13 10 19 10 19s6.5-6 6.5-11C16.5 4.41 13.59 1.5 10 1.5zm0 9a2.5 2.5 0 110-5 2.5 2.5 0 010 5z" fill="rgba(255,255,255,0.68)"/>
    </svg>

<!-- My-location widget -->
<div class="loc-sheet" id="loc-sheet">
  <div class="loc-card">
    <div class="loc-handle" id="loc-handle"><div class="loc-handle-bar"></div></div>
    <div class="loc-body">
      <div class="loc-puck">
        <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
          <path d="M10 2L17.5 10L10 13.5L2.5 10L10 2Z" fill="#0a84ff"/>
          <path d="M10 13.5V18" stroke="#0a84ff" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="loc-text">
        <div class="loc-title" id="loc-title">My Location</div>
        <div class="loc-subtitle" id="loc-subtitle">Double-tap the button to find nearest charger</div>
      </div>

<!-- Charging station sheet -->
<div class="sheet" id="sheet">
  <div class="card">
    <div class="card-vignette-l"></div>
    <div class="card-vignette-r"></div>

    <div class="card-handle" id="sheet-handle"><div class="card-handle-bar"></div></div>

    <!-- Spinner overlay -->
    <div class="faceid-wrap" id="faceid-wrap">

            </svg>

              <circle cx="3" cy="7" r="1.8" stroke="#0a84ff" stroke-width="1.4"/>
              <circle cx="11" cy="11" r="1.8" stroke="#0a84ff" stroke-width="1.4"/>
              <path d="M4.6 6.2L9.4 3.8M4.6 7.8L9.4 10.2" stroke="#0a84ff" stroke-width="1.3" stroke-linecap="round"/>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
/* ══════════════════════════════════════════════════════
   MAP INIT
══════════════════════════════════════════════════════ */
const BEIRUT  = [33.8886, 35.4955];
const LEBANON = [33.8547, 35.8623];

const map = L.map('map', {
  center: BEIRUT, zoom: 15,
  zoomControl: false, attributionControl: false, preferCanvas: true,
});
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png', {
  maxZoom:19, subdomains:'abcd', keepBuffer:4,
  updateWhenIdle:false, updateWhenZooming:false,
}).addTo(map);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}{r}.png', {
  maxZoom:19, subdomains:'abcd', keepBuffer:4,
  updateWhenIdle:false, updateWhenZooming:false, pane:'shadowPane',
}).addTo(map);

/* ══════════════════════════════════════════════════════
   STATION DATA
   Each station has a latlng, name, street, city, ports,
   price — used both for pins and for the nearest-station
   widget that opens on double-tap.
══════════════════════════════════════════════════════ */
const STATIONS = [
  { id:'hamra',    name:'Hamra Charging Hub',    street:'Hamra Street',        city:'Beirut',  latlng:[33.8886,35.4955], ports:'2 of 4 ports free', price:'Free',  mapsUrl:'https://www.google.com/maps/dir/?api=1&destination=33.8886,35.4955' },
  { id:'verdun',   name:'Verdun EV Point',        street:'Verdun Street',        city:'Beirut',  latlng:[33.8820,35.4862], ports:'1 of 2 ports free', price:'Free',  mapsUrl:'https://www.google.com/maps/dir/?api=1&destination=33.8820,35.4862' },
  { id:'mmikhael', name:'Mar Mikhael Charge',      street:'Armenia Street',       city:'Beirut',  latlng:[33.8914,35.5125], ports:'3 of 4 ports free', price:'Free',  mapsUrl:'https://www.google.com/maps/dir/?api=1&destination=33.8914,35.5125' },
  { id:'dbayeh',   name:'ABC Dbayeh Station',      street:'Highway 51',           city:'Dbayeh',  latlng:[33.9150,35.5805], ports:'2 of 4 ports free', price:'Free',  mapsUrl:'https://www.google.com/maps/dir/?api=1&destination=33.9150,35.5805' },
  { id:'jounieh',  name:'Jounieh Marina Charge',   street:'Waterfront Promenade', city:'Jounieh', latlng:[33.9802,35.6141], ports:'4 of 6 ports free', price:'Free',  mapsUrl:'https://www.google.com/maps/dir/?api=1&destination=33.9802,35.6141' },
  { id:'byblos',   name:'Byblos Charge',           street:'Old Port Road',        city:'Jbeil',   latlng:[34.1220,35.6513], ports:'1 of 2 ports free', price:'Free',  mapsUrl:'https://www.google.com/maps/dir/?api=1&destination=34.1220,35.6513' },
  { id:'tripoli',  name:'Tripoli North Hub',        street:'Al Mina Road',         city:'Tripoli', latlng:[34.4368,35.8360], ports:'3 of 6 ports free', price:'Free',  mapsUrl:'https://www.google.com/maps/dir/?api=1&destination=34.4368,35.8360' },
];

/* Active station for openDirections() */
let activeStation = STATIONS[0];

/* ══════════════════════════════════════════════════════
   PIN FACTORY
══════════════════════════════════════════════════════ */
function makePinHtml(id) {
  return `<div class="dest-pin" id="dest-pin-${id}">
    <div class="dest-pin-ping"></div>
    <div class="dest-pin-body"></div>
    <div class="dest-pin-ring"></div>
    <div class="dest-pin-inner"></div>
    <svg class="dest-pin-bolt" viewBox="0 0 9 12" xmlns="http://www.w3.org/2000/svg">
      <path d="M5.8 0.5L1.5 6.5H4.8L3 11.5L8 5H4.7L5.8 0.5Z" fill="#0a84ff"/>
    </svg>
    <div class="dest-pin-tip"></div>
    <div class="dest-pin-shadow"></div>
  </div>`;
}

const markers = {};
STATIONS.forEach(s => {
  const icon = L.divIcon({
    html: makePinHtml(s.id),
    className:'', iconSize:[22,31], iconAnchor:[11,31],
  });
  const m = L.marker(s.latlng, { icon, interactive:true, keyboard:false }).addTo(map);
  m.on('click',      () => openSheet(s));
  m.on('touchstart', () => openSheet(s));
  markers[s.id] = m;
});

/* ══════════════════════════════════════════════════════
   STATION SHEET
══════════════════════════════════════════════════════ */
const sheet      = document.getElementById('sheet');
const handle     = document.getElementById('sheet-handle');
const faceidWrap = document.getElementById('faceid-wrap');
const carImg     = document.getElementById('car-img');
const carPH      = document.getElementById('car-placeholder');
const revealIds  = ['ci-identity','ci-line','ci-status','ci-rows','ci-cta'];

let isOpen = false, startY = 0, dragY = 0, dragging = false;
let loaderTimer;

function populateSheet(s) {
  document.getElementById('ci-name').textContent   = s.name;
  document.getElementById('ci-street').textContent = s.street;
  document.getElementById('ci-city').textContent   = s.city;
  document.getElementById('ci-ports').textContent  = s.ports;
  document.getElementById('ci-price').textContent  = s.price;
}

function revealContent() {
  revealIds.forEach((id, i) => {
    setTimeout(() => {
      document.getElementById(id)?.classList.add('reveal');
    }, i * 55);
  });
  if (carImg.src && carImg.src !== window.location.href) {
    carPH.style.display = 'none';
    carImg.classList.add('visible');
  }
}

function openSheet(station) {
  if (isOpen) closeSheet();
  activeStation = station;
  populateSheet(station);

  const pin = document.getElementById(`dest-pin-${station.id}`);
  if (pin) { pin.classList.add('tapped'); setTimeout(() => pin.classList.remove('tapped'), 280); }

  map.flyTo(station.latlng, 17, { animate:true, duration:0.9, easeLinearity:0.16 });

  isOpen = true;
  sheet.classList.add('open');

  /* Reset loader */
  clearTimeout(loaderTimer);
  faceidWrap.classList.remove('done');
  revealIds.forEach(id => document.getElementById(id)?.classList.remove('reveal'));

  loaderTimer = setTimeout(() => {
    faceidWrap.classList.add('done');
    revealContent();
  }, 1200);
}

function closeSheet() {
  clearTimeout(loaderTimer);
  isOpen = false;
  sheet.classList.remove('open');
  sheet.style.transform = '';
  sheet.classList.remove('dragging');
}

/* Swipe to dismiss */
function dragStart(e) {
  if (!isOpen) return;
  dragging = true; dragY = 0;
  startY = (e.touches ? e.touches[0] : e).clientY;
  sheet.classList.add('dragging');
}
function dragMove(e) {
  if (!dragging) return;
  const y = (e.touches ? e.touches[0] : e).clientY;
  dragY = Math.max(0, y - startY);
  sheet.style.transform = `translateX(-50%) translateY(${dragY}px)`;
}
function dragEnd() {
  if (!dragging) return;
  dragging = false; sheet.classList.remove('dragging');
  if (dragY > 80) { closeSheet(); }
  else {
    sheet.style.transform = '';
    sheet.style.transition = 'transform 0.46s cubic-bezier(0.32,0.72,0,1)';
    requestAnimationFrame(() => requestAnimationFrame(() => { sheet.style.transition = ''; }));
  }
  dragY = 0;
}
handle.addEventListener('mousedown',   dragStart);
handle.addEventListener('touchstart',  dragStart, { passive:true });
document.addEventListener('mousemove', dragMove);
document.addEventListener('touchmove', dragMove, { passive:true });
document.addEventListener('mouseup',   dragEnd);
document.addEventListener('touchend',  dragEnd);

map.on('click', () => { if (isOpen) closeSheet(); if (locSheetOpen) closeLocSheet(); });

function openDirections() {
  window.open(activeStation.mapsUrl, '_blank');
}

/* Auto-open Hamra on load */
setTimeout(() => openSheet(STATIONS[0]), 600);

/* ══════════════════════════════════════════════════════
   RECENTER
══════════════════════════════════════════════════════ */
document.getElementById('btn-recenter').addEventListener('click', () => {
  if (isOpen) closeSheet();
  if (locSheetOpen) closeLocSheet();
  const b = document.getElementById('btn-recenter');
  b.classList.add('spinning');
  setTimeout(() => b.classList.remove('spinning'), 640);
  map.flyTo(LEBANON, 8, { animate:true, duration:1.7, easeLinearity:0.2 });
});

/* ══════════════════════════════════════════════════════
   SEARCH BAR
══════════════════════════════════════════════════════ */
const searchRow   = document.getElementById('search-row');
const searchPill  = document.getElementById('map-search');
const searchInput = document.getElementById('search-input');
const searchClear = document.getElementById('search-clear');

let searchActive = false;

function activateSearch() {
  if (searchActive) return;
  searchActive = true;
  searchRow.classList.add('active');
  searchPill.classList.add('active');
  setTimeout(() => searchInput.focus(), 80);
}
function cancelSearch() {
  searchActive = false;
  searchInput.blur(); searchInput.value = '';
  searchRow.classList.remove('active');
  searchPill.classList.remove('active');
  searchClear.classList.remove('visible');
}
function clearSearch(e) {
  e.stopPropagation();
  searchInput.value = '';
  searchInput.focus();
  searchClear.classList.remove('visible');
}
searchInput.addEventListener('focus', activateSearch);
searchInput.addEventListener('input', () => {
  searchClear.classList.toggle('visible', searchInput.value.length > 0);
});
searchInput.addEventListener('keydown', e => {
  if (e.key === 'Escape') { cancelSearch(); return; }
  if (e.key === 'Enter')  { e.preventDefault(); cancelSearch(); showLPM(); }
});

/* ══════════════════════════════════════════════════════
   LPM ALERT
══════════════════════════════════════════════════════ */
const lpmScrim = document.getElementById('lpm-scrim');
function showLPM()  { lpmScrim.classList.add('active'); }
function closeLPM() { lpmScrim.classList.remove('active'); }
function activateMic(e) { e.stopPropagation(); cancelSearch(); showLPM(); }
function showVoice() { showLPM(); }
function stopVoice() { closeLPM(); }

/* ══════════════════════════════════════════════════════
   GPS — location + nearest station
══════════════════════════════════════════════════════ */
const btnGps = document.getElementById('btn-gps');
let gpsMarker = null, gpsCircle = null, gpsWatchId = null;
let userHeading = null, gpsHasFirst = false;

/* Haversine distance in km */
function haversineKm(lat1, lon1, lat2, lon2) {
  const R = 6371, dLat = (lat2-lat1)*Math.PI/180, dLon = (lon2-lon1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function findNearest(userLat, userLng) {
  let best = null, bestKm = Infinity;
  STATIONS.forEach(s => {
    const d = haversineKm(userLat, userLng, s.latlng[0], s.latlng[1]);
    if (d < bestKm) { bestKm = d; best = s; }
  });
  return { station: best, km: bestKm };
}

/* GPS marker HTML */
function buildGpsDot(heading) {
  const cone = (heading !== null && !isNaN(heading))
    ? `<div class="gps-heading" style="transform:rotate(${heading}deg)"></div>` : '';
  return `<div class="gps-wrap">
    <div class="gps-pulse" id="gps-pulse"></div>
    ${cone}
    <div class="gps-ring"></div>
    <div class="gps-dot"></div>
  </div>`;
}
function makeGpsIcon(heading) {
  return L.divIcon({ html: buildGpsDot(heading), className:'', iconSize:[22,22], iconAnchor:[11,11] });
}

/* Toast helpers */
let toastTimer = null;
function showGpsToast(msg, dur) {
  const t = document.getElementById('gps-toast');
  clearTimeout(toastTimer); t.textContent = msg; t.classList.add('show');
  toastTimer = setTimeout(() => t.classList.remove('show'), dur || 3500);
}
function hideGpsToast() {
  clearTimeout(toastTimer); document.getElementById('gps-toast').classList.remove('show');
}

/* Button state helpers */
function setBtnLocating() { btnGps.classList.remove('gps-active'); btnGps.classList.add('gps-locating'); }
function setBtnActive()   { btnGps.classList.remove('gps-locating'); btnGps.classList.add('gps-active'); }
function setBtnIdle()     { btnGps.classList.remove('gps-locating','gps-active'); }

/* Nearest banner */
let nearestTimer = null;
function showNearestBanner(text) {
  const b = document.getElementById('nearest-banner');
  document.getElementById('nearest-text').textContent = text;
  b.classList.add('show');
  clearTimeout(nearestTimer);
  nearestTimer = setTimeout(() => b.classList.remove('show'), 5500);
}

/* Position handler */
function onGpsPosition(pos) {
  hideGpsToast();
  const { latitude:lat, longitude:lng, accuracy, heading } = pos.coords;
  const latlng = [lat, lng];
  if (heading !== null && !isNaN(heading)) userHeading = heading;

  if (!gpsMarker) {
    gpsHasFirst = true;

    gpsCircle = L.circle(latlng, {
      radius: accuracy, color:'#0a84ff', fillColor:'#0a84ff',
      fillOpacity:0.07, weight:0.5, interactive:false, pane:'shadowPane',
    }).addTo(map);

    gpsMarker = L.marker(latlng, {
      icon: makeGpsIcon(userHeading), interactive:true, keyboard:false, zIndexOffset:-50,
    }).addTo(map);

    /* Tap dot → open location widget */
    gpsMarker.on('click', () => {
      const ll = gpsMarker.getLatLng();
      openLocSheet(ll.lat, ll.lng, gpsCircle ? gpsCircle.getRadius() : 20);
    });

    /* Keep station pins on top */
    Object.values(markers).forEach(m => m.setZIndexOffset(200));

    map.flyTo(latlng, 16, { animate:true, duration:1.1, easeLinearity:0.22 });
    setBtnActive();
    openLocSheet(lat, lng, accuracy);

    setTimeout(() => { const el = document.getElementById('gps-pulse'); if (el) el.classList.add('done'); }, 4000);
  } else {
    gpsMarker.setLatLng(latlng);
    gpsMarker.setIcon(makeGpsIcon(userHeading));
    gpsCircle.setLatLng(latlng); gpsCircle.setRadius(accuracy);
    setBtnActive();
  }
}

function onGpsError(err) {
  setBtnIdle();
  const msgs = { 1:'Location access denied. Enable in Settings.', 2:'Unable to determine your location.', 3:'Location request timed out.' };
  showGpsToast(msgs[err.code] || 'Location unavailable.', 4500);
}

/* Compass */
function startCompass() {
  const handler = e => {
    const h = e.webkitCompassHeading != null ? e.webkitCompassHeading
      : (e.absolute && e.alpha != null ? (360 - e.alpha) % 360 : null);
    if (h !== null) { userHeading = h; if (gpsMarker) gpsMarker.setIcon(makeGpsIcon(h)); }
  };
  if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
    window._iosOrientationHandler = handler;
  } else {
    window.addEventListener('deviceorientationabsolute', handler, true);
    window.addEventListener('deviceorientation', handler, true);
  }
}

/* Double-tap detection */
let gpsTapCount = 0, gpsTapTimer = null;

function requestLocation() {
  if (!navigator.geolocation) { showGpsToast('GPS not supported in this browser.'); return; }

  gpsTapCount++;
  clearTimeout(gpsTapTimer);
  gpsTapTimer = setTimeout(() => { gpsTapCount = 0; }, 420);

  /* ── DOUBLE TAP ── find nearest + open its widget */
  if (gpsTapCount >= 2 && gpsHasFirst && gpsMarker) {
    gpsTapCount = 0;
    const ll = gpsMarker.getLatLng();
    const { station, km } = findNearest(ll.lat, ll.lng);
    if (station) {
      closeLocSheet();
      const distStr = km < 1 ? `${Math.round(km * 1000)} m` : `${km.toFixed(1)} km`;
      showNearestBanner(`Nearest charger: ${station.name} — ${distStr}`);
      /* Fly to nearest, then open its station sheet */
      map.flyTo(station.latlng, 16, { animate:true, duration:1.1, easeLinearity:0.18 });
      setTimeout(() => openSheet(station), 600);
    }
    return;
  }

  /* ── SINGLE TAP when already located ── re-center + open loc widget */
  if (gpsHasFirst && gpsMarker) {
    const ll = gpsMarker.getLatLng();
    map.flyTo(ll, 16, { animate:true, duration:0.9, easeLinearity:0.2 });
    openLocSheet(ll.lat, ll.lng, gpsCircle ? gpsCircle.getRadius() : 20);
    return;
  }

  /* ── FIRST TAP ── start GPS */
  setBtnLocating();
  showGpsToast('Locating…', 15000);

  const opts = { enableHighAccuracy:true, maximumAge:3000, timeout:15000 };
  navigator.geolocation.getCurrentPosition(onGpsPosition, onGpsError, opts);
  if (gpsWatchId !== null) navigator.geolocation.clearWatch(gpsWatchId);
  gpsWatchId = navigator.geolocation.watchPosition(onGpsPosition, onGpsError, opts);

  if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
    DeviceOrientationEvent.requestPermission()
      .then(s => {
        if (s === 'granted' && window._iosOrientationHandler) {
          window.addEventListener('deviceorientationabsolute', window._iosOrientationHandler, true);
          window.addEventListener('deviceorientation', window._iosOrientationHandler, true);
        }
      }).catch(() => {});
  }
}

btnGps.addEventListener('click', requestLocation);
startCompass();

/* ══════════════════════════════════════════════════════
   MY-LOCATION WIDGET
══════════════════════════════════════════════════════ */
const locSheet    = document.getElementById('loc-sheet');
const locHandle   = document.getElementById('loc-handle');
const locTitle    = document.getElementById('loc-title');
const locSubtitle = document.getElementById('loc-subtitle');
let locSheetOpen = false, locDragY = 0, locStartY = 0, locDragging = false;

function openLocSheet(lat, lng, acc) {
  if (isOpen) closeSheet();
  locTitle.textContent = 'My Location';
  locSubtitle.textContent = acc < 50
    ? `±${Math.round(acc)} m accuracy · double-tap button to find nearest charger`
    : 'Double-tap the location button to find nearest charger';
  locSheetOpen = true;
  locSheet.classList.add('open');
}
function closeLocSheet() {
  locSheetOpen = false;
  locSheet.classList.remove('open');
  locSheet.style.transform = '';
  locSheet.classList.remove('dragging');
}

function locDragStart(e) {
  if (!locSheetOpen) return;
  locDragging = true; locDragY = 0;
  locStartY = (e.touches ? e.touches[0] : e).clientY;
  locSheet.classList.add('dragging');
}
function locDragMove(e) {
  if (!locDragging) return;
  const y = (e.touches ? e.touches[0] : e).clientY;
  locDragY = Math.max(0, y - locStartY);
  locSheet.style.transform = `translateX(-50%) translateY(${locDragY}px)`;
}
function locDragEnd() {
  if (!locDragging) return;
  locDragging = false; locSheet.classList.remove('dragging');
  if (locDragY > 70) { closeLocSheet(); }
  else {
    locSheet.style.transform = '';
    locSheet.style.transition = 'transform 0.46s cubic-bezier(0.32,0.72,0,1)';
    requestAnimationFrame(() => requestAnimationFrame(() => { locSheet.style.transition = ''; }));
  }
  locDragY = 0;
}
locHandle.addEventListener('mousedown',   locDragStart);
locHandle.addEventListener('touchstart',  locDragStart, { passive:true });
document.addEventListener('mousemove',    locDragMove);
document.addEventListener('touchmove',    locDragMove,  { passive:true });
document.addEventListener('mouseup',      locDragEnd);
document.addEventListener('touchend',     locDragEnd);
</script>
</body>
